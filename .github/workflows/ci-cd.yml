name: FinGuide AI CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    # Backend Setup
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install
        
    # Frontend Setup
    - name: Install Frontend Dependencies & Build
      run: |
        cd frontend
        npm install
        npm run build
        
    # Docker Build Test
    - name: Build Docker Compose
      run: docker-compose build
